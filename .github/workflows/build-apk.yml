name: Build TVBox APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK licenses & install components
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653" "cmake;3.22.1"

    - name: Install buildozer
      run: |
        pip install buildozer cython

    - name: Prepare buildozer project
      run: |
        # 创建 main.py - 用 Kivy WebView 加载本地 HTML
        cat > main.py << 'PYEOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.webview import WebView
from kivy.core.window import Window
from kivy.utils import platform

Window.clearcolor = (0.06, 0.06, 0.07, 1)

class TVBoxApp(App):
    def build(self):
        layout = BoxLayout(orientation='vertical')
        self.webview = WebView()
        html_path = self.user_data_dir + '/index.html'
        self.webview.load_url('file://' + html_path)
        layout.add_widget(self.webview)
        return layout

    def on_start(self):
        import shutil, os
        src = os.path.join(os.path.dirname(__file__), 'index.html')
        dst = os.path.join(self.user_data_dir, 'index.html')
        os.makedirs(self.user_data_dir, exist_ok=True)
        if os.path.exists(src):
            shutil.copy2(src, dst)

if __name__ == '__main__':
    TVBoxApp().run()
PYEOF

        # 创建 buildozer.spec
        cat > buildozer.spec << 'SPECEOF'
[app]
title = 视频盒子
package.name = tvbox
package.domain = com
source.dir = .
source.include_exts = py,html,js,css,json,png,jpg
version = 1.0.0
requirements = python3,kivy,android,webkit,pyjnius
orientation = portrait
fullscreen = 0
android.api = 33
android.minapi = 21
android.ndk = 25b
android.arch = arm64-v8a
android.permissions = INTERNET,ACCESS_NETWORK_STATE
android.wakelock = True
android.enable_androidx = True
[buildozer]
log_level = 2
warn_on_root = 1
SPECEOF

    - name: Build debug APK
      env:
        ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
      run: |
        buildozer -v android debug 2>&1 | tail -50

    - name: Locate APK
      run: |
        find . -name "*.apk" -type f 2>/dev/null

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: tvbox-apk
        path: bin/*.apk
